<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neura Whiteboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f0e8;--paper:#fdfaf4;--ink:#1a1a2e;--muted:#8a8070;
      --green:#0d5c3a;--green-l:#22a86a;
      --tb:#1a1a2e;--tb-b:#2d2d4e;
      --shadow:0 8px 32px rgba(26,26,46,.18);
    }
    body{font-family:'DM Sans',sans-serif;background:var(--bg);overflow:hidden;height:100vh;width:100vw;cursor:crosshair}
    #canvas-container{position:fixed;inset:0;background:radial-gradient(circle at 20% 20%,rgba(232,93,74,.04) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(74,144,217,.04) 0%,transparent 50%),var(--bg)}
    #main-canvas{position:absolute;top:0;left:0;touch-action:none}

    /* TOOLBAR */
    #toolbar{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--tb);border:1px solid var(--tb-b);border-radius:20px;padding:10px 14px;display:flex;align-items:center;gap:6px;box-shadow:var(--shadow),0 0 0 1px rgba(255,255,255,.05) inset;z-index:100;backdrop-filter:blur(12px)}
    .tool-sep{width:1px;height:28px;background:var(--tb-b);margin:0 4px}
    .tool-btn{width:38px;height:38px;border:none;border-radius:10px;background:transparent;color:#aaa;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .15s;position:relative}
    .tool-btn:hover{background:rgba(255,255,255,.08);color:#fff}
    .tool-btn.active{background:rgba(255,255,255,.12);color:#fff;box-shadow:0 0 0 1.5px rgba(255,255,255,.2)}
    .tip{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:#111;color:#eee;font-size:11px;padding:4px 8px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .1s;font-family:'DM Sans',sans-serif}
    .tool-btn:hover .tip{opacity:1}
    .color-swatch{width:22px;height:22px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;flex-shrink:0}
    .color-swatch:hover{transform:scale(1.2)}
    .color-swatch.active{border-color:#fff;transform:scale(1.15)}
    .size-track{display:flex;align-items:center;gap:5px;padding:0 6px}
    .size-dot{border-radius:50%;background:#888;cursor:pointer;transition:background .15s,transform .15s;flex-shrink:0}
    .size-dot:hover{background:#fff;transform:scale(1.2)}
    .size-dot.active{background:#fff}

    /* TOPBAR */
    #topbar{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:99;pointer-events:none}
    #top-left{display:flex;align-items:center;gap:10px;pointer-events:all}
    #logo{font-family:'Caveat',cursive;font-size:20px;font-weight:600;color:var(--ink);opacity:.55;pointer-events:all;user-select:none;text-decoration:none}
    #top-actions{display:flex;gap:6px;pointer-events:all;flex-wrap:wrap}
    .top-btn{height:30px;padding:0 12px;border-radius:9px;border:1.5px solid rgba(26,26,46,.15);background:rgba(253,250,244,.88);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;backdrop-filter:blur(8px);white-space:nowrap}
    .top-btn:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}
    .top-btn.green{background:var(--green);color:#fff;border-color:var(--green)}
    .top-btn.green:hover{background:#0a4a2f}
    #room-badge{display:flex;align-items:center;gap:6px;background:rgba(253,250,244,.88);border:1.5px solid rgba(26,26,46,.12);border-radius:9px;padding:0 10px;height:30px;backdrop-filter:blur(8px);font-size:11.5px;color:var(--muted)}
    #room-badge .rdot{width:7px;height:7px;border-radius:50%;background:#bbb;flex-shrink:0}
    #room-badge .rdot.live{background:var(--green-l);animation:blink 1.8s ease infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

    /* USERS PANEL */
    #users-panel{position:fixed;top:60px;right:16px;z-index:98;display:flex;flex-direction:column;gap:4px;pointer-events:none}
    .user-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(253,250,244,.92);border:1.5px solid rgba(26,26,46,.1);border-radius:20px;padding:4px 10px 4px 6px;font-size:11px;font-weight:500;color:var(--ink);backdrop-filter:blur(8px)}
    .uavatar{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:700;flex-shrink:0}

    /* TEXT INPUT */
    #text-input{position:fixed;display:none;font-family:'Caveat',cursive;font-size:24px;border:none;outline:none;background:transparent;color:#1a1a2e;min-width:200px;z-index:200;resize:none;overflow:hidden;caret-color:#e85d4a;line-height:1.3}

    /* CURSOR RING */
    #cursor-ring{position:fixed;pointer-events:none;border-radius:50%;border:1.5px solid rgba(26,26,46,.35);transform:translate(-50%,-50%);transition:width .1s,height .1s;z-index:9999}

    /* SNACK */
    #snack{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:12.5px;padding:8px 16px;border-radius:10px;opacity:0;transition:all .25s;pointer-events:none;z-index:300;font-family:'DM Sans',sans-serif;white-space:nowrap}
    #snack.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* SELECTION BOX */
    #sel-box{position:fixed;border:2px dashed rgba(13,92,58,.8);background:rgba(13,92,58,.04);pointer-events:none;display:none;z-index:50}

    /* REMOTE CURSORS */
    .rcursor{position:fixed;pointer-events:none;z-index:9998;transition:left .09s linear,top .09s linear}
    .rcursor .rlabel{position:absolute;top:20px;left:8px;font-size:11px;font-weight:600;padding:2px 7px;border-radius:6px;color:#fff;white-space:nowrap;font-family:'DM Sans',sans-serif}

    /* MODAL */
    .modal-bg{position:fixed;inset:0;background:rgba(10,20,14,.6);backdrop-filter:blur(10px);z-index:500;display:flex;align-items:center;justify-content:center}
    .modal{background:var(--paper);border-radius:22px;padding:36px;max-width:440px;width:92%;box-shadow:0 24px 80px rgba(10,20,14,.3)}
    .modal h2{font-family:'Caveat',cursive;font-size:30px;font-weight:600;color:var(--ink);margin-bottom:6px}
    .modal p.sub{font-size:13.5px;color:var(--muted);line-height:1.6;margin-bottom:22px}
    .mbtn{width:100%;padding:13px 16px;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;text-align:left;display:flex;align-items:center;gap:12px;margin-bottom:10px}
    .mbtn:last-child{margin-bottom:0}
    .mbtn.dk{background:var(--ink);color:#fff}
    .mbtn.dk:hover{background:#0d1220;transform:translateY(-1px)}
    .mbtn.gr{background:var(--green);color:#fff}
    .mbtn.gr:hover{background:#0a4a2f;transform:translateY(-1px)}
    .mbtn.ol{background:transparent;color:var(--ink);border:1.5px solid rgba(26,26,46,.15)}
    .mbtn.ol:hover{background:rgba(26,26,46,.05)}
    .micon{font-size:20px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:9px;background:rgba(255,255,255,.15);flex-shrink:0}
    .mbtn.ol .micon{background:rgba(26,26,46,.06)}
    .minput{width:100%;padding:11px 14px;border:1.5px solid rgba(26,26,46,.15);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);background:#fff;outline:none;transition:border-color .15s;margin-bottom:12px}
    .minput:focus{border-color:var(--green)}
    .minput::placeholder{color:#bbb}
    .mlabel{font-size:12px;font-weight:500;color:var(--muted);margin-bottom:6px;display:block}
    .mrow{display:flex;gap:10px}
    .mrow .mbtn{flex:1;margin-bottom:0}
    .copy-box{display:flex;align-items:center;gap:8px;background:rgba(13,92,58,.06);border:1.5px solid rgba(13,92,58,.15);border-radius:10px;padding:10px 12px;margin-bottom:16px}
    .copy-box span{flex:1;font-size:11.5px;color:var(--green);font-family:monospace;word-break:break-all}
    .cbtn{flex-shrink:0;background:var(--green);color:#fff;border:none;border-radius:7px;padding:6px 12px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;font-weight:500}
    .cbtn:hover{background:#0a4a2f}

    body.eraser-mode{cursor:none}
    body.text-mode{cursor:text}
    body.select-mode{cursor:crosshair}
  </style>
</head>
<body>
<div id="canvas-container"><canvas id="main-canvas"></canvas></div>
<div id="sel-box"></div>
<div id="cursor-ring" style="width:20px;height:20px"></div>
<div id="topbar">
  <div id="top-left">
    <a href="index.html" id="logo">✏ neura</a>
    <div id="room-badge" style="display:none"><div class="rdot" id="rdot"></div><span id="rlabel">solo</span></div>
  </div>
  <div id="top-actions">
    <button class="top-btn" id="btn-undo">↩ Undo</button>
    <button class="top-btn" id="btn-redo">↪ Redo</button>
    <button class="top-btn" id="btn-clear">🗑 Clear</button>
    <button class="top-btn" id="btn-export">⬇ Export</button>
    <button class="top-btn green" id="btn-go-mp" style="display:none">👥 Go Multiplayer</button>
    <button class="top-btn green" id="btn-invite" style="display:none">👥 Invite</button>
    <button class="top-btn" id="btn-nick">👤 <span id="nick-lbl">Me</span></button>
  </div>
</div>
<div id="users-panel"></div>
<div id="toolbar">
  <button class="tool-btn active" id="tool-pen" data-tool="pen">✏️<span class="tip">Pen (P)</span></button>
  <button class="tool-btn" id="tool-highlighter" data-tool="highlighter">🖊️<span class="tip">Highlighter (H)</span></button>
  <button class="tool-btn" id="tool-line" data-tool="line">╱<span class="tip">Line (L)</span></button>
  <button class="tool-btn" id="tool-arrow" data-tool="arrow">→<span class="tip">Arrow (A)</span></button>
  <button class="tool-btn" id="tool-rect" data-tool="rect">▭<span class="tip">Rectangle (R)</span></button>
  <button class="tool-btn" id="tool-circle" data-tool="circle">○<span class="tip">Circle (C)</span></button>
  <button class="tool-btn" id="tool-text" data-tool="text">T<span class="tip">Text (T)</span></button>
  <button class="tool-btn" id="tool-select" data-tool="select">⬚<span class="tip">Select Export (S)</span></button>
  <button class="tool-btn" id="tool-eraser" data-tool="eraser">◻<span class="tip">Eraser (E)</span></button>
  <div class="tool-sep"></div>
  <div class="color-swatch active" data-color="#1a1a2e" style="background:#1a1a2e"></div>
  <div class="color-swatch" data-color="#e85d4a" style="background:#e85d4a"></div>
  <div class="color-swatch" data-color="#4a90d9" style="background:#4a90d9"></div>
  <div class="color-swatch" data-color="#52b788" style="background:#52b788"></div>
  <div class="color-swatch" data-color="#f4a261" style="background:#f4a261"></div>
  <div class="color-swatch" data-color="#b48fff" style="background:#b48fff"></div>
  <div class="tool-sep"></div>
  <div class="size-track">
    <div class="size-dot active" data-size="3" style="width:8px;height:8px"></div>
    <div class="size-dot" data-size="6" style="width:12px;height:12px"></div>
    <div class="size-dot" data-size="12" style="width:18px;height:18px"></div>
    <div class="size-dot" data-size="24" style="width:24px;height:24px"></div>
  </div>
</div>
<textarea id="text-input" rows="1" placeholder="Type here…"></textarea>
<div id="snack"></div>

<script>
(() => {
'use strict';

// ── CONSTANTS
const EXPIRY = 7*24*60*60*1000;
const PAD = 40;
const U_COLORS = ['#e85d4a','#4a90d9','#52b788','#f4a261','#b48fff','#22a86a','#e91e8c','#ff9800'];

// ── STATE
let tool='pen', color='#1a1a2e', strokeSize=3;
let isDrawing=false, startX=0, startY=0, lastX=0, lastY=0;
let history=[], redoStack=[], previewSnap=null, textPos=null;
let selStart=null, selRect=null, selActive=false;
let roomId=null, isMP=false;
let myId='u_'+Math.random().toString(36).slice(2,9);
let myNick='', myColor=U_COLORS[Math.floor(Math.random()*U_COLORS.length)];
let peers={}, channel=null, remoteCursors={};
let currentPts=[];

// ── DOM
const canvas=document.getElementById('main-canvas');
const ctx=canvas.getContext('2d');
const textInput=document.getElementById('text-input');
const cursorRing=document.getElementById('cursor-ring');
const snack=document.getElementById('snack');
const selBox=document.getElementById('sel-box');
const usersPanel=document.getElementById('users-panel');
const roomBadge=document.getElementById('room-badge');
const rdot=document.getElementById('rdot');
const rlabel=document.getElementById('rlabel');
const btnInvite=document.getElementById('btn-invite');
const btnGoMp=document.getElementById('btn-go-mp');
const nickLbl=document.getElementById('nick-lbl');

// ── RESIZE
function resize() {
  const snap=canvas.width>0?ctx.getImageData(0,0,canvas.width,canvas.height):null;
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  if(snap) ctx.putImageData(snap,0,0);
}
resize(); window.addEventListener('resize',resize);

// ── SNACK
function showSnack(msg){
  snack.textContent=msg; snack.classList.add('show');
  clearTimeout(snack._t); snack._t=setTimeout(()=>snack.classList.remove('show'),2200);
}

// ── INDEXEDDB
let db=null;
async function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open('neura_v1',1);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('strokes')) d.createObjectStore('strokes',{keyPath:'id'});
    };
    req.onsuccess=e=>{db=e.target.result;res()};
    req.onerror=()=>rej(req.error);
  });
}
function dbTx(store,mode){return db.transaction(store,mode).objectStore(store)}
function dbPut(obj){if(db) dbTx('strokes','readwrite').put(obj)}
function dbDel(id){if(db) dbTx('strokes','readwrite').delete(id)}
function dbAll(){return new Promise(res=>{if(!db)return res([]);const r=dbTx('strokes','readonly').getAll();r.onsuccess=()=>res(r.result||[])})}

async function getStrokes(rid){
  const all=await dbAll(), now=Date.now();
  const valid=all.filter(s=>s.roomId===rid&&(now-s.ts)<EXPIRY);
  all.filter(s=>(now-s.ts)>=EXPIRY).forEach(s=>dbDel(s.id)); // prune expired
  return valid.sort((a,b)=>a.ts-b.ts);
}
async function clearStrokes(rid){const all=await dbAll();all.filter(s=>s.roomId===rid).forEach(s=>dbDel(s.id))}
async function persist(data){
  const id=myId+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,5);
  dbPut({id,roomId:roomId||'solo',data,ts:Date.now()});
  return id;
}

// ── RENDER STROKE
function renderStroke(d){
  ctx.save();
  ctx.lineCap=ctx.lineJoin='round';
  ctx.globalAlpha=d.alpha||1;
  ctx.globalCompositeOperation=d.op||'source-over';
  ctx.strokeStyle=ctx.fillStyle=d.color;
  ctx.lineWidth=d.size;
  if(d.type==='path'&&d.pts?.length>1){
    ctx.beginPath(); ctx.moveTo(d.pts[0][0],d.pts[0][1]);
    d.pts.forEach(p=>ctx.lineTo(p[0],p[1])); ctx.stroke();
  } else if(d.type==='line'){
    ctx.beginPath(); ctx.moveTo(d.x1,d.y1); ctx.lineTo(d.x2,d.y2); ctx.stroke();
  } else if(d.type==='arrow'){
    const a=Math.atan2(d.y2-d.y1,d.x2-d.x1),hl=Math.max(14,d.size*4);
    ctx.beginPath(); ctx.moveTo(d.x1,d.y1); ctx.lineTo(d.x2,d.y2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(d.x2,d.y2);
    ctx.lineTo(d.x2-hl*Math.cos(a-Math.PI/7),d.y2-hl*Math.sin(a-Math.PI/7));
    ctx.lineTo(d.x2-hl*Math.cos(a+Math.PI/7),d.y2-hl*Math.sin(a+Math.PI/7));
    ctx.closePath(); ctx.fill();
  } else if(d.type==='rect'){
    ctx.strokeRect(d.x1,d.y1,d.w,d.h);
  } else if(d.type==='circle'){
    ctx.beginPath(); ctx.ellipse(d.cx,d.cy,d.rx,d.ry,0,0,Math.PI*2); ctx.stroke();
  } else if(d.type==='text'){
    ctx.font=`${d.fs}px Caveat`; ctx.fillStyle=d.color;
    d.lines.forEach((l,i)=>ctx.fillText(l,d.x,d.y+i*d.lh));
  } else if(d.type==='erase'&&d.pts?.length>1){
    ctx.globalCompositeOperation='destination-out'; ctx.lineWidth=d.size*2;
    ctx.beginPath(); ctx.moveTo(d.pts[0][0],d.pts[0][1]);
    d.pts.forEach(p=>ctx.lineTo(p[0],p[1])); ctx.stroke();
  } else if(d.type==='clear'){
    ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  ctx.restore();
}

async function replay(rid){
  const strokes=await getStrokes(rid);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  strokes.forEach(s=>renderStroke(s.data));
}

// ── BROADCAST
function initChannel(rid){
  try{if(channel)channel.close();}catch(e){}
  channel=new BroadcastChannel('neura_room_'+rid);
  channel.onmessage=e=>handleMsg(e.data);
}
function bcast(msg){if(channel)channel.postMessage({...msg,from:myId,nick:myNick||'Anonymous',ucolor:myColor})}

function handleMsg(msg){
  if(msg.from===myId)return;
  const pid=msg.from;
  if(msg.type==='stroke'){
    renderStroke(msg.data);
    dbPut({id:pid+'_'+msg.ts,roomId,data:msg.data,ts:msg.ts});
  } else if(msg.type==='cursor'){
    showRemoteCursor(pid,msg.nick,msg.ucolor,msg.x,msg.y);
  } else if(msg.type==='join'){
    peers[pid]={nick:msg.nick,color:msg.ucolor};
    renderPeers(); showSnack(`${msg.nick||'Someone'} joined ✨`);
    bcast({type:'welcome'});
  } else if(msg.type==='leave'){
    const n=(peers[pid]||{}).nick||'Someone';
    delete peers[pid]; renderPeers();
    removeRC(pid); showSnack(`${n} left`);
  }
}
function announceJoin(){bcast({type:'join'})}
function announceLeave(){bcast({type:'leave'})}
window.addEventListener('beforeunload',()=>{if(isMP)announceLeave()});

// ── REMOTE CURSORS
function showRemoteCursor(id,nick,col,x,y){
  peers[id]={nick,color:col};renderPeers();
  if(!remoteCursors[id]){
    const el=document.createElement('div');
    el.className='rcursor';
    el.innerHTML=`<svg width="16" height="22" viewBox="0 0 16 22"><path d="M0 0 L0 18 L5 13 L9 21 L11 20 L7 12 L13 12 Z" fill="${col}" stroke="#fff" stroke-width="1.2"/></svg><div class="rlabel" style="background:${col}">${nick||'Anon'}</div>`;
    document.body.appendChild(el); remoteCursors[id]=el;
  }
  remoteCursors[id].style.left=x+'px'; remoteCursors[id].style.top=y+'px';
  remoteCursors[id].style.opacity='1';
  clearTimeout(remoteCursors[id]._t);
  remoteCursors[id]._t=setTimeout(()=>{if(remoteCursors[id])remoteCursors[id].style.opacity='0'},3000);
}
function removeRC(id){if(remoteCursors[id]){remoteCursors[id].remove();delete remoteCursors[id]}}

// ── PEERS PANEL
function renderPeers(){
  usersPanel.innerHTML='';
  const self=document.createElement('div'); self.className='user-chip';
  self.innerHTML=`<div class="uavatar" style="background:${myColor}">${(myNick||'M')[0].toUpperCase()}</div>${myNick||'Anonymous'} <span style="opacity:.45">(you)</span>`;
  usersPanel.appendChild(self);
  Object.entries(peers).forEach(([,p])=>{
    const el=document.createElement('div'); el.className='user-chip';
    el.innerHTML=`<div class="uavatar" style="background:${p.color||'#888'}">${(p.nick||'?')[0].toUpperCase()}</div>${p.nick||'Anonymous'}`;
    usersPanel.appendChild(el);
  });
}

// ── UNDO / REDO
function saveState(){history.push(canvas.toDataURL());if(history.length>60)history.shift();redoStack=[]}
function undo(){if(!history.length)return;redoStack.push(canvas.toDataURL());const img=new Image();img.src=history.pop();img.onload=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(img,0,0)};showSnack('Undone')}
function redo(){if(!redoStack.length)return;history.push(canvas.toDataURL());const img=new Image();img.src=redoStack.pop();img.onload=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(img,0,0)};showSnack('Redone')}

// ── DRAWING
function getPos(e){
  const r=canvas.getBoundingClientRect();
  return e.touches?{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top}:{x:e.clientX-r.left,y:e.clientY-r.top};
}

function onDown(e){
  if(e.button!==undefined&&e.button!==0)return;
  if(tool==='text'||tool==='select')return;
  const{x,y}=getPos(e);
  isDrawing=true; startX=x;startY=y;lastX=x;lastY=y; currentPts=[[x,y]];
  saveState();
  if(tool==='pen'||tool==='highlighter'){
    // nothing extra needed
  } else if(tool==='eraser'){
    ctx.globalCompositeOperation='destination-out';
    ctx.lineWidth=strokeSize*2; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(x,y);
  } else {
    previewSnap=ctx.getImageData(0,0,canvas.width,canvas.height);
  }
}

function onMove(e){
  const{x,y}=getPos(e);
  if(isMP) bcast({type:'cursor',x,y});
  if(!isDrawing)return;
  currentPts.push([x,y]);
  if(tool==='pen'||tool==='highlighter'){
    ctx.save();
    ctx.strokeStyle=color; ctx.lineWidth=tool==='highlighter'?strokeSize*3:strokeSize;
    ctx.lineCap=ctx.lineJoin='round';
    ctx.globalAlpha=tool==='highlighter'?0.35:1;
    ctx.globalCompositeOperation='source-over';
    ctx.beginPath(); ctx.moveTo(lastX,lastY); ctx.lineTo(x,y); ctx.stroke();
    ctx.restore();
  } else if(tool==='eraser'){
    ctx.globalCompositeOperation='destination-out'; ctx.lineWidth=strokeSize*2;
    ctx.lineTo(x,y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x,y);
  } else if(previewSnap){
    ctx.putImageData(previewSnap,0,0);
    ctx.save(); ctx.strokeStyle=ctx.fillStyle=color; ctx.lineWidth=strokeSize; ctx.lineCap=ctx.lineJoin='round';
    if(tool==='line'){ctx.beginPath();ctx.moveTo(startX,startY);ctx.lineTo(x,y);ctx.stroke();}
    else if(tool==='arrow'){drawarrow(ctx,startX,startY,x,y);}
    else if(tool==='rect'){ctx.strokeRect(startX,startY,x-startX,y-startY);}
    else if(tool==='circle'){const rx=Math.abs(x-startX)/2,ry=Math.abs(y-startY)/2;ctx.beginPath();ctx.ellipse(startX+(x-startX)/2,startY+(y-startY)/2,rx,ry,0,0,Math.PI*2);ctx.stroke();}
    ctx.restore();
  }
  lastX=x;lastY=y;
}

function drawarrow(c,x1,y1,x2,y2){
  const a=Math.atan2(y2-y1,x2-x1),hl=Math.max(14,strokeSize*4);
  c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();
  c.beginPath();c.moveTo(x2,y2);
  c.lineTo(x2-hl*Math.cos(a-Math.PI/7),y2-hl*Math.sin(a-Math.PI/7));
  c.lineTo(x2-hl*Math.cos(a+Math.PI/7),y2-hl*Math.sin(a+Math.PI/7));
  c.closePath();c.fill();
}

async function onUp(e){
  if(!isDrawing)return; isDrawing=false;
  ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over'; previewSnap=null;

  let d=null;
  if(tool==='pen'||tool==='highlighter')
    d={type:'path',pts:currentPts,color,size:tool==='highlighter'?strokeSize*3:strokeSize,alpha:tool==='highlighter'?0.35:1,op:'source-over'};
  else if(tool==='eraser') d={type:'erase',pts:currentPts,color,size:strokeSize};
  else if(tool==='line') d={type:'line',x1:startX,y1:startY,x2:lastX,y2:lastY,color,size:strokeSize};
  else if(tool==='arrow') d={type:'arrow',x1:startX,y1:startY,x2:lastX,y2:lastY,color,size:strokeSize};
  else if(tool==='rect') d={type:'rect',x1:startX,y1:startY,w:lastX-startX,h:lastY-startY,color,size:strokeSize};
  else if(tool==='circle'){
    const rx=Math.abs(lastX-startX)/2,ry=Math.abs(lastY-startY)/2;
    d={type:'circle',cx:startX+(lastX-startX)/2,cy:startY+(lastY-startY)/2,rx,ry,color,size:strokeSize};
  }
  if(d){await persist(d);if(isMP)bcast({type:'stroke',data:d,ts:Date.now()})}
}

canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('touchstart',e=>{e.preventDefault();onDown(e)},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();onMove(e)},{passive:false});
canvas.addEventListener('touchend',e=>{e.preventDefault();onUp(e)},{passive:false});

// ── TEXT
canvas.addEventListener('click',e=>{
  if(tool!=='text')return;
  const{x,y}=getPos(e); textPos={x,y};
  textInput.style.display='block';
  const r=canvas.getBoundingClientRect();
  textInput.style.left=(x+r.left)+'px'; textInput.style.top=(y+r.top-6)+'px';
  textInput.style.color=color; textInput.value=''; textInput.style.height='auto'; textInput.focus();
});
textInput.addEventListener('keydown',e=>{
  if(e.key==='Escape'){commitText();return}
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();commitText();return}
  setTimeout(()=>{textInput.style.height='auto';textInput.style.height=textInput.scrollHeight+'px'},0);
});
textInput.addEventListener('blur',commitText);

async function commitText(){
  if(!textPos||!textInput.value.trim()){textInput.style.display='none';return}
  saveState();
  const fs=Math.max(20,strokeSize*5),lh=Math.max(24,strokeSize*6);
  ctx.font=`${fs}px Caveat`;ctx.fillStyle=color;ctx.globalAlpha=1;
  const lines=textInput.value.split('\n');
  lines.forEach((l,i)=>ctx.fillText(l,textPos.x,textPos.y+i*lh));
  const d={type:'text',x:textPos.x,y:textPos.y,lines,fs,lh,color};
  textInput.style.display='none';textInput.value='';textPos=null;
  await persist(d); if(isMP)bcast({type:'stroke',data:d,ts:Date.now()});
}

// ── SELECTION EXPORT
canvas.addEventListener('mousedown',e=>{if(tool!=='select')return;selStart=getPos(e);selRect=null;selActive=true});
canvas.addEventListener('mousemove',e=>{
  if(tool!=='select'||!selActive)return;
  const{x,y}=getPos(e);
  const sx=Math.min(selStart.x,x),sy=Math.min(selStart.y,y),sw=Math.abs(x-selStart.x),sh=Math.abs(y-selStart.y);
  selRect={sx,sy,sw,sh};
  const r=canvas.getBoundingClientRect();
  selBox.style.cssText=`display:block;left:${sx+r.left}px;top:${sy+r.top}px;width:${sw}px;height:${sh}px`;
});
canvas.addEventListener('mouseup',e=>{
  if(tool!=='select'||!selActive)return; selActive=false;
  if(selRect&&selRect.sw>10&&selRect.sh>10)exportArea(selRect.sx,selRect.sy,selRect.sw,selRect.sh);
  selBox.style.display='none'; selRect=null;
});

function paddedExport(sx,sy,sw,sh){
  const tmp=document.createElement('canvas'); tmp.width=sw+PAD*2; tmp.height=sh+PAD*2;
  const tc=tmp.getContext('2d'); tc.fillStyle='#fdfaf4'; tc.fillRect(0,0,tmp.width,tmp.height);
  tc.drawImage(canvas,sx,sy,sw,sh,PAD,PAD,sw,sh); return tmp;
}
function exportArea(sx,sy,sw,sh){
  const tmp=paddedExport(sx,sy,sw,sh);
  const a=document.createElement('a'); a.download=`neura-sel-${Date.now()}.png`; a.href=tmp.toDataURL(); a.click();
  showSnack('Selection exported ✓');
}
function exportFull(){
  const tmp=paddedExport(0,0,canvas.width,canvas.height);
  const a=document.createElement('a'); a.download=`neura-board-${Date.now()}.png`; a.href=tmp.toDataURL(); a.click();
  showSnack('Board exported ✓');
}

// ── CURSOR RING
document.addEventListener('mousemove',e=>{
  cursorRing.style.left=e.clientX+'px'; cursorRing.style.top=e.clientY+'px';
  const s=tool==='eraser'?strokeSize*2+8:20;
  cursorRing.style.width=s+'px'; cursorRing.style.height=s+'px';
  cursorRing.style.borderColor=tool==='eraser'?'rgba(232,93,74,.5)':'rgba(26,26,46,.3)';
  cursorRing.style.display=tool==='text'?'none':'block';
});

// ── TOOLBAR BINDINGS
document.querySelectorAll('.tool-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); tool=btn.dataset.tool;
    selBox.style.display='none';
    document.body.className=tool==='eraser'?'eraser-mode':tool==='text'?'text-mode':tool==='select'?'select-mode':'';
  });
});
document.querySelectorAll('.color-swatch').forEach(sw=>{
  sw.addEventListener('click',()=>{document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active'));sw.classList.add('active');color=sw.dataset.color});
});
document.querySelectorAll('.size-dot').forEach(dot=>{
  dot.addEventListener('click',()=>{document.querySelectorAll('.size-dot').forEach(d=>d.classList.remove('active'));dot.classList.add('active');strokeSize=parseInt(dot.dataset.size)});
});

document.getElementById('btn-undo').addEventListener('click',undo);
document.getElementById('btn-redo').addEventListener('click',redo);

document.getElementById('btn-clear').addEventListener('click',async()=>{
  if(!confirm('Clear canvas? This will remove all content for all users in this room.'))return;
  saveState(); ctx.clearRect(0,0,canvas.width,canvas.height);
  await clearStrokes(roomId||'solo');
  if(isMP){const d={type:'clear'};await persist(d);bcast({type:'stroke',data:d,ts:Date.now()})}
  showSnack('Canvas cleared');
});

document.getElementById('btn-export').addEventListener('click',()=>showExportModal());
btnInvite.addEventListener('click',showInviteModal);
btnGoMp.addEventListener('click',()=>showNickModal('upgrade'));
document.getElementById('btn-nick').addEventListener('click',()=>{
  modal(`<h2>👤 Change Name</h2><p class="sub">How should others see you?</p>
    <span class="mlabel">Nickname</span>
    <input class="minput" id="ni" placeholder="Anonymous" value="${myNick}" maxlength="24" autocomplete="off"/>
    <div class="mrow"><button class="mbtn ol" id="nc-x"><div class="micon">✕</div>Cancel</button><button class="mbtn gr" id="nc-s"><div class="micon">✓</div>Save</button></div>`,
  bg=>{
    const inp=bg.querySelector('#ni'); inp.focus();inp.select();
    function save(){myNick=inp.value.trim();nickLbl.textContent=myNick||'Anon';rlabel.textContent=isMP?'live · '+(myNick||'Anon'):'solo';renderPeers();if(isMP)bcast({type:'join'});bg.remove()}
    bg.querySelector('#nc-s').onclick=save;
    bg.querySelector('#nc-x').onclick=()=>bg.remove();
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')save()});
  });
});

// ── KEYBOARD SHORTCUTS
document.addEventListener('keydown',e=>{
  if(document.activeElement===textInput||document.activeElement.tagName==='INPUT')return;
  const k=e.key.toLowerCase();
  if((e.ctrlKey||e.metaKey)&&k==='z'){e.preventDefault();undo();return}
  if((e.ctrlKey||e.metaKey)&&(k==='y'||(e.shiftKey&&k==='z'))){e.preventDefault();redo();return}
  const map={p:'pen',h:'highlighter',l:'line',a:'arrow',r:'rect',c:'circle',t:'text',e:'eraser',s:'select'};
  if(map[k]&&!e.ctrlKey&&!e.metaKey){
    document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(`tool-${map[k]}`)?.classList.add('active');
    tool=map[k]; selBox.style.display='none';
    document.body.className=tool==='eraser'?'eraser-mode':tool==='text'?'text-mode':tool==='select'?'select-mode':'';
  }
});

// ── MODAL HELPERS
function modal(html, setup){
  const bg=document.createElement('div'); bg.className='modal-bg';
  bg.innerHTML=`<div class="modal">${html}</div>`;
  document.body.appendChild(bg);
  bg.addEventListener('click',e=>{if(e.target===bg)bg.remove()});
  if(setup)setup(bg); return bg;
}

function showInviteModal(){
  const url=location.href.split('#')[0]+'#'+roomId;
  modal(`<h2>👥 Invite to Room</h2>
    <p class="sub">Share this link. Anyone with it can join and draw with you.</p>
    <div class="copy-box"><span>${url}</span><button class="cbtn" id="cb">Copy</button></div>
    <p style="font-size:11.5px;color:var(--muted)">Room: <code style="background:rgba(0,0,0,.06);padding:2px 6px;border-radius:4px;font-size:11px">${roomId}</code></p>
    <button class="mbtn ol" style="margin-top:14px" id="inv-close"><div class="micon">✕</div>Close</button>`,
  bg=>{
    bg.querySelector('#cb').onclick=()=>navigator.clipboard.writeText(url).then(()=>{bg.querySelector('#cb').textContent='Copied!';setTimeout(()=>bg.remove(),1000)});
    bg.querySelector('#inv-close').onclick=()=>bg.remove();
  });
}

function showExportModal(){
  modal(`<h2>⬇ Export Canvas</h2>
    <p class="sub">All exports include 40px whitespace padding around content.</p>
    <button class="mbtn dk" id="exp-f"><div class="micon">🖼️</div><div><strong>Export Full Board</strong><br><small style="opacity:.6;font-size:11px">Entire canvas + padding</small></div></button>
    <button class="mbtn ol" id="exp-s"><div class="micon">⬚</div><div><strong>Select Area to Export</strong><br><small style="opacity:.55;font-size:11px">Drag a box on the canvas</small></div></button>`,
  bg=>{
    bg.querySelector('#exp-f').onclick=()=>{bg.remove();exportFull()};
    bg.querySelector('#exp-s').onclick=()=>{
      bg.remove();
      document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('active'));
      document.getElementById('tool-select').classList.add('active');
      tool='select'; document.body.className='select-mode';
      showSnack('Drag to select an area to export');
    };
  });
}

// ── STARTUP
function showStartModal(){
  const isJoining=location.hash.length>2&&location.hash.slice(1).startsWith('room_');
  modal(`<h2>✏️ Neura Whiteboard</h2>
    <p class="sub">Your canvas, your rules. Start solo or collaborate in real-time.</p>
    <button class="mbtn dk" id="m-solo"><div class="micon">🖊️</div><div><strong>Solo Canvas</strong><br><small style="opacity:.6;font-size:11px">Private board, just you</small></div></button>
    <button class="mbtn gr" id="m-multi"><div class="micon">👥</div><div><strong>Create Multiplayer Room</strong><br><small style="opacity:.6;font-size:11px">Invite others to draw together</small></div></button>
    ${isJoining?`<button class="mbtn ol" id="m-join"><div class="micon">👥</div><div><strong>Join Room</strong><br><small style="opacity:.55;font-size:11px">You were invited!</small></div></button>`:''}`,
  bg=>{
    bg.querySelector('#m-solo').onclick=()=>{bg.remove();startSolo()};
    bg.querySelector('#m-multi').onclick=()=>{bg.remove();showNickModal('host')};
    bg.querySelector('#m-join')?.addEventListener('click',()=>{bg.remove();showNickModal('join')});
  });
}

function showNickModal(role){
  const isJoin=role==='join';
  const isUpgrade=role==='upgrade';
  modal(`<h2>${isJoin?'👋 Joining Room':isUpgrade?'👥 Go Multiplayer':'👥 Create Room'}</h2>
    <p class="sub">${isJoin?'Set a nickname so others know who you are, or stay anonymous.':isUpgrade?'Your solo canvas will become a multiplayer room. Others can join and draw together with you.':'Give yourself a name so collaborators can identify you.'}</p>
    <span class="mlabel">Your nickname (optional)</span>
    <input class="minput" id="ni2" placeholder="Anonymous" maxlength="24" autocomplete="off"/>
    <div class="mrow">
      <button class="mbtn ol" id="n-anon"><div class="micon">🎭</div>Stay Anon</button>
      <button class="mbtn gr" id="n-go"><div class="micon">→</div>${isUpgrade?'Upgrade':'Let\'s Go'}</button>
    </div>`,
  bg=>{
    const inp=bg.querySelector('#ni2'); inp.focus();
    function go(nick){
      myNick=nick||''; nickLbl.textContent=myNick||'Anon'; bg.remove();
      if(isJoin) joinRoom(location.hash.slice(1));
      else if(isUpgrade) upgradeToMultiplayer();
      else createRoom();
    }
    bg.querySelector('#n-anon').onclick=()=>go('');
    bg.querySelector('#n-go').onclick=()=>go(inp.value.trim());
    inp.addEventListener('keydown',e=>{if(e.key==='Enter')go(inp.value.trim())});
  });
}

async function startSolo(){
  roomId='solo'; isMP=false; location.hash='';
  roomBadge.style.display='flex'; rdot.className='rdot'; rlabel.textContent='solo';
  btnInvite.style.display='none';
  btnGoMp.style.display=''; // show upgrade button in solo mode
  await replay('solo'); renderPeers();
}

async function upgradeToMultiplayer(){
  // Keep existing canvas content — migrate solo strokes to new room
  const oldStrokes = await getStrokes('solo');
  roomId='room_'+Math.random().toString(36).slice(2,9);
  isMP=true; location.hash=roomId;
  roomBadge.style.display='flex'; rdot.className='rdot live';
  rlabel.textContent='live · '+(myNick||'Anon');
  btnInvite.style.display='';
  btnGoMp.style.display='none'; // hide once in multiplayer
  // Re-tag existing strokes under new roomId so they persist in the room
  oldStrokes.forEach(s=>{ s.roomId=roomId; dbPut(s); });
  initChannel(roomId); renderPeers(); announceJoin();
  showSnack('Upgraded to multiplayer 👥');
  setTimeout(showInviteModal,500);
}

async function createRoom(){
  roomId='room_'+Math.random().toString(36).slice(2,9);
  isMP=true; location.hash=roomId;
  roomBadge.style.display='flex'; rdot.className='rdot live';
  rlabel.textContent='live · '+(myNick||'Anon');
  btnInvite.style.display='';
  btnGoMp.style.display='none';
  initChannel(roomId); await replay(roomId); renderPeers(); announceJoin();
  showSnack('Room created · share the link 👥');
  setTimeout(showInviteModal,600);
}

async function joinRoom(rid){
  roomId=rid; isMP=true;
  roomBadge.style.display='flex'; rdot.className='rdot live';
  rlabel.textContent='live · '+(myNick||'Anon');
  btnInvite.style.display='';
  btnGoMp.style.display='none';
  initChannel(rid); await replay(rid); renderPeers(); announceJoin();
  showSnack('Joined room ✨');
}

// ── INIT
(async()=>{
  await openDB();
  showStartModal();
})();

})();
</script>
</body>
